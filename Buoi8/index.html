<!-- 
    DOM: (Document Object Modal): là một cấu trúc dữ liệu dạng cây do trình duyệt tạo ra từ HTML
    Mỗi thẻ HTML được chuyển thành 1 object trong bộ bộ của trình duyệt để Javascript có thể thao tác được

    Cách hoạt động:
     - Trình duyệt đọc file HTML
     - Phân tích HTML
     - Tạo DOM Tree trong memory
     - Javacsript truy cập và thay đổi DOM
     - Trình duyệt render lại giao diện

     Mẫu DOM của thẻ h1
    {
        tag: "h1",
        id: "title",
        innerText: "Hello front-end"
    }

    Document:
        - là 1 object dại diện diện cho toàn trang web của mình
        - là điểm bắt dầu để truy cập đến cây DOM

    Element: 
        - là object đại diện cho 1 thẻ HTML cụ thể

    Node:
        - Đơn vị cơ bản của DOM
        Các loại node
            + Element node -> h1
            + Text node -> "Hello"
            + Attribute node -> id="title"

    DOM Tree: 
        Cấu trúc phân cấp dạng cây của HTML

        node cha (parent) -> div
        node con (child) -> h1, a

    * Truy xuất element
        - lấy element từ DOM dể thao tác
        - JS tìm element theo 3 phần:
            + id -> chỉ lấy 1
            + class -> lấy toàn bộ
            + tag -> 

    Cú pháp:
        C1: document.getElementById("title") // Cách cũ
        C2: document.querySelector("") // Cách hiện đại

        - querySelector -> chỉ lấy 1
        - querySelectorAll -> lấy toàn bộ

    innerHTML:
        - parse chuỗi -> html
        - tạo element mới

    Attribute: 
        Thuộc tính của element

        Phương thức
            setAttribute("tên_thuộc_tính", "giá_trị")
            removeAttribute("tên_thuộc_tính")

    Style
        cho phép thay đổi css trực tiếp bằng js
        camelCase
        inline css
-->
