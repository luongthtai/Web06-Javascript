<!-- 
    Javascript: là một ngôn ngữ lập trình
        Tạo tương tác trên web (nhấn nút, hiện/ẩn, validate form, ...)
        Xử lý dữ liệu (mảng, object, lọc, tìm kiếm, tính toán, ...)
        Gọi API, làm ứng dụng web,...
    Js chủ yếu chạy ở 2 môi trường
        - Trình duyệt (Browser): chạy cùng HTML/CSS đẻ diều khiển giao diện -> Front-end
        - Node.js: chạy JS trên máy tính/Server (không cần trình duyệt)     -> Back-end

    Cách nhúng file Js và HTML
        2 cách phổ biến nhất:
            - Nhúng trực tiếp: 
            - Nhúng file ngoài (khuyến khích):
-->
